name: Ekitapligim
options:
  bundleIdPrefix: com.ekitapligim
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Development: debug
  Staging: release
  Production: release
packages:
  EkitapligimCore:
    path: .
  Readium:
    url: https://github.com/readium/swift-toolkit.git
    exactVersion: 3.9.0
targets:
  Ekitapligim:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/Ekitapligim
        excludes:
          - Config
          - Support
          - StoreKit
    resources:
      - path: App/Ekitapligim/Support/PrivacyInfo.xcprivacy
      - path: App/Ekitapligim/StoreKit/Ekitapligim.storekit
    dependencies:
      - package: EkitapligimCore
        product: EkitapligimCore
      - package: Readium
        product: ReadiumShared
      - package: Readium
        product: ReadiumStreamer
      - package: Readium
        product: ReadiumNavigator
    settings:
      base:
        INFOPLIST_FILE: App/Ekitapligim/Support/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.10"
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_COMPILATION_MODE: singlefile
        SWIFT_ENABLE_BATCH_MODE: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: App/Ekitapligim/Support/Ekitapligim.entitlements
      configs:
        Development:
          base:
            PRODUCT_BUNDLE_IDENTIFIER: com.ekitapligim.app.dev
          xcconfig: App/Ekitapligim/Config/Development.xcconfig
        Staging:
          base:
            PRODUCT_BUNDLE_IDENTIFIER: com.ekitapligim.app.staging
          xcconfig: App/Ekitapligim/Config/Staging.xcconfig
        Production:
          base:
            PRODUCT_BUNDLE_IDENTIFIER: com.ekitapligim.app
          xcconfig: App/Ekitapligim/Config/Production.xcconfig
  EkitapligimTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/EkitapligimTests
    dependencies:
      - target: Ekitapligim
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ekitapligim.app.tests
        SWIFT_VERSION: "5.10"
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_COMPILATION_MODE: singlefile
        SWIFT_ENABLE_BATCH_MODE: NO
        GENERATE_INFOPLIST_FILE: YES
  EkitapligimUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/EkitapligimUITests
    dependencies:
      - target: Ekitapligim
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ekitapligim.app.uitests
        TEST_TARGET_NAME: Ekitapligim
        SWIFT_VERSION: "5.10"
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_COMPILATION_MODE: singlefile
        SWIFT_ENABLE_BATCH_MODE: NO
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Ekitapligim:
    build:
      targets:
        Ekitapligim: all
    run:
      config: Development
      commandLineArguments:
        "-FIRDebugDisabled": true
    test:
      config: Development
      targets:
        - EkitapligimTests
        - EkitapligimUITests
    archive:
      config: Production
