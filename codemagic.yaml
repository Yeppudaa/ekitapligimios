workflows:
  ios-production:
    name: Ekitapligim iOS Production
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Ekitapligim Codemagic"

    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ekitapligim.app
      vars:
        APPLE_TEAM_ID: "QA67383767"
        XCODE_PROJECT: "Ekitapligim.xcodeproj"
        XCODE_SCHEME: "Ekitapligim"
        XCODE_CONFIGURATION: "Production"

    scripts:
      - name: Install xcodegen if missing
        script: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew update
            brew install xcodegen
          fi

      - name: Generate Xcode project
        script: |
          echo "Building revision: $(git rev-parse --short HEAD)"
          xcodegen generate

      - name: Configure App Store code signing
        script: |
          set -euo pipefail
          mkdir -p "$CM_BUILD_DIR/build"
          echo "Available Apple signing identities:"
          security find-identity -v -p codesigning || true
          xcode-project use-profiles 2>&1 | tee "$CM_BUILD_DIR/build/configure-code-signing.log"

      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild -resolvePackageDependencies -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME"

      - name: Run app tests
        script: |
          set -o pipefail
          mkdir -p "$CM_BUILD_DIR/build"
          xcodebuild -showBuildSettings \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" 2>&1 | tee "$CM_BUILD_DIR/build/show-build-settings.log"
          if ! xcodebuild test \
            -quiet \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Development \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=latest" \
            -resultBundlePath "$CM_BUILD_DIR/build/EkitapligimTests.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_COMPILATION_MODE=singlefile \
            SWIFT_ENABLE_BATCH_MODE=NO 2>&1 | tee "$CM_BUILD_DIR/build/run-app-tests.log"; then
            echo "xcodebuild test failed"
            echo "---- run-app-tests.log: error summary ----"
            grep -nEi "error:|fatal error|testing failed|test failed|no such module|cannot find|could not|unable to|codesign|provision" "$CM_BUILD_DIR/build/run-app-tests.log" || true
            echo "---- run-app-tests.log: last 200 lines ----"
            tail -n 200 "$CM_BUILD_DIR/build/run-app-tests.log"
            exit 65
          fi

      - name: Build IPA for TestFlight
        script: |
          set -euo pipefail
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" 2>&1 | tee "$CM_BUILD_DIR/build/build-ipa.log"

    artifacts:
      - build/**/*
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - acarsamsung37@gmail.com
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
